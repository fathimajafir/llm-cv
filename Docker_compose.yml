version: "3.9"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv-screener-api
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/app/.cache/huggingface   # persist downloaded models
      - ./src:/app/src                      # live reload in dev
    environment:
      - HF_TOKEN=${HF_TOKEN:-}              # optional: set in .env for higher rate limits
      - ENV=${ENV:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Streamlit frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cv-screener-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hf_cache:
    driver: local